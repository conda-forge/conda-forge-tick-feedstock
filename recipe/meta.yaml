{% set python_min = "3.12" %}
{% set name = "conda-forge-tick" %}
{% set version = "2026.6.50" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/conda-forge/conda-forge-bot/archive/refs/tags/{{ version }}.tar.gz
  sha256: bdcb576e96e152be492a641f7f3b2e130c5b5a5559bcafad420d11c7ad09148b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1
  entry_points:
    - conda-forge-tick = conda_forge_tick.cli:main
    - conda-forge-tick-container = conda_forge_tick.container_cli:cli

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - setuptools_scm >=8
  run:
    - python >={{ python_min }}
    - attrs
    - backoff
    - bcrypt
    - cachecontrol
    - cachetools
    - click
    - conda >=25
    - conda-lock
    - conda-forge-pinning
    - conda-libmamba-solver
    - conda-forge-metadata >=0.12.0
    - conda-forge-feedstock-ops >=0.16.0
    - conda-recipe-manager >=0.6.1
    - conda-package-handling
    - conda-smithy >=3.61.2
    - conda-build >=25
    - curl
    - dateparser
    - depfinder
    - distributed
    - feedparser
    - frozendict
    - git
    - github3.py
    - grayskull >=3.1.0
    - jinja2
    - lockfile
    - mamba >=0.23
    - msgpack-python
    - networkx !=2.8.1
    - numpy
    - orjson
    - packaging
    - psutil
    - pydantic
    - pydantic-extra-types
    - pydantic-settings
    - pygithub
    - pymongo
    - pynamodb
    - python-dateutil
    - python-graphviz
    - rattler-build >=0.35.4
    - rattler-build-conda-compat >=1.4.6,<2,!=1.4.7,!=1.4.8
    - requests
    - ruamel.yaml
    - ruamel.yaml.jinja2
    - scipy
    - stopit
    - streamz
    - tar
    - tqdm
    - wget
    - wurlitzer
    - yaml

test:
  requires:
    - python {{ python_min }}
  imports:
    - conda_forge_tick
  commands:
    - python -c "import conda_forge_tick; assert conda_forge_tick.__version__ == '{{ version }}'"
    - conda-forge-tick --help
    - conda-forge-tick-container --help

about:
  home: https://github.com/conda-forge/conda-forge-bot
  summary: 'Flagship repo for conda-forge-bot'
  license: BSD-3-Clause AND MIT
  license_file: License

extra:
  recipe-maintainers:
    - beckermr
    - regro-cf-autotick-bot  # bot account controlled by the bot team
